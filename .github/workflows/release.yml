name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run tests
        run: go test -short -v ./...

      - name: Generate changelog
        id: changelog
        run: |
          # Use existing CHANGELOG.md
          if [ -f "CHANGELOG.md" ]; then
            {
              echo 'changelog<<DELIMITER'
              cat CHANGELOG.md
              echo 'DELIMITER'
            } >> "$GITHUB_OUTPUT"
          else
            # Fallback: generate from git log if CHANGELOG.md doesn't exist
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            {
              echo 'changelog<<DELIMITER'
              echo "## What's Changed"
              if [ -z "$PREV_TAG" ]; then
                git log --pretty=format:"- %s"
              else
                git log ${PREV_TAG}..HEAD --pretty=format:"- %s"
              fi
              echo 'DELIMITER'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
